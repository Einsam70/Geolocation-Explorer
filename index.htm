    <style>
        /* --- Variables para Temas (Claro / Oscuro) --- */
        :root {
            --bg-color: #f4f4f4;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #ccc;
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #1e1e1e;
            --container-bg: #2d2d2d;
            --text-color: #f5f5f5;
            --border-color: #555;
            --input-bg: #3d3d3d;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* Botón Modo Oscuro */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: var(--container-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
        }

        h2 { color: var(--text-color); }
        label { display: block; margin-top: 10px; }
        
        select, input, textarea {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px;
            border-radius: 4px;
            margin: 5px;
        }

        button {
            background-color: #4caf50;
            color: white;
            cursor: pointer;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
        }
        button:hover { opacity: 0.9; }

        .buttonsigue { background-color: #4199d7; color: white; cursor: pointer; border: none; padding: 8px 15px; border-radius: 4px;}
        .bajacsv { background-color: #a8242d; color: white; cursor: pointer; border: none; padding: 8px 15px; border-radius: 4px;}
        
        .container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        .campo-texto {
            width: 300px;
            height: 200px;
            resize: none;
            font-family: monospace;
        }

        /* Barra de Progreso Visual */
        .progress-bar-container {
            width: 300px;
            background-color: #ddd;
            border-radius: 10px;
            margin: 15px auto;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 12px;
            background-color: #4caf50;
            transition: width 0.1s ease;
        }
    </style>
</head>

    <script>
        let baseDatosIP = [];
        let estaCargado = false;

        // --- FUNCIONALIDAD: MODO OSCURO ---
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const btn = document.getElementById("themeBtn");
            if (currentTheme === "dark") {
                document.documentElement.removeAttribute("data-theme");
                btn.innerHTML = "🌙 Modo Oscuro";
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
                btn.innerHTML = "☀️ Modo Claro";
            }
        }

        // --- FUNCIONALIDAD: FILTRAR DROPDOWN MIENTRAS ESCRIBES ---
        function filtrarDropdownPais() {
            const input = document.getElementById('pais').value.toLowerCase().trim();
            const select = document.getElementById('paises');
            
            if(!input) return;

            for (let i = 0; i < select.options.length; i++) {
                const textoOpcion = select.options[i].text.toLowerCase();
                const valorOpcion = select.options[i].value.toLowerCase();
                
                // Si coincide con las primeras letras del nombre o con el código ISO (ES, AR...)
                if (textoOpcion.startsWith(input) || valorOpcion === input) {
                    select.selectedIndex = i;
                    break;
                }
            }
        }

        function seleccionarPais() {
            limpiarform();
            const paisSeleccionado = document.getElementById('paises').value;
            document.getElementById('pais').value = paisSeleccionado;
            if(estaCargado) {
                procesarFiltroPais(paisSeleccionado.toLowerCase());
            }
        }

        // --- FUNCIONALIDAD: CARGA DEL CSV CON PORCENTAJE REAL ---
        function buscarDatos() {
            const paisInput = document.getElementById('pais').value.trim().toLowerCase();
            if (paisInput === '') {
                alert('Por favor, ingrese o seleccione un país');
                return;
            }

            if (estaCargado) {
                procesarFiltroPais(paisInput);
                return;
            }

            const progresoDiv = document.getElementById('progreso');
            const progContainer = document.getElementById('progContainer');
            const progBar = document.getElementById('progBar');

            progresoDiv.innerHTML = "Iniciando descarga del archivo local...";
            progContainer.style.display = "block";

            // Usamos Fetch + un Reader para poder medir el tamaño de los bytes leídos
            fetch('csv/datos.csv')
                .then(response => {
                    if (!response.ok) throw new Error('No se encontró "csv/datos.csv". Revisa las instrucciones.');
                    
                    const contentLength = response.headers.get('content-length');
                    const totalBytes = contentLength ? parseInt(contentLength, 10) : 0;
                    
                    let bytesLeidos = 0;
                    const reader = response.body.getReader();
                    const stream = new ReadableStream({
                        start(controller) {
                            function read() {
                                reader.read().then(({ done, value }) => {
                                    if (done) {
                                        controller.close();
                                        return;
                                    }
                                    bytesLeidos += value.byteLength;
                                    if (totalBytes > 0) {
                                        const porcentaje = Math.round((bytesLeidos / totalBytes) * 100);
                                        progBar.style.width = porcentaje + "%";
                                        progresoDiv.innerHTML = `Descargando desde tu disco: ${porcentaje}%`;
                                    }
                                    controller.enqueue(value);
                                    read();
                                }).catch(err => controller.error(err));
                            }
                            read();
                        }
                    });

                    return new Response(stream).text();
                })
                .then(textoCompleto => {
                    progresoDiv.innerHTML = "Procesando y organizando índices en memoria...";
                    
                    // Pequeño truco para no bloquear la pantalla: dejar respirar al navegador un milisegundo
                    setTimeout(() => {
                        const filas = textoCompleto.split('\n');
                        baseDatosIP = filas.map(fila => {
                            return fila.replace(/"/g, '').split(',');
                        }).filter(datos => datos.length >= 6 && !datos[0].includes(':')); // Filtra vacíos e IPv6 rápidamente

                        estaCargado = true;
                        progContainer.style.display = "none";
                        procesarFiltroPais(paisInput);
                    }, 50);
                })
                .catch(error => {
                    console.error(error);
                    alert(error.message);
                    progresoDiv.innerHTML = "Error al cargar los datos.";
                    progContainer.style.display = "none";
                });
        }

        function procesarFiltroPais(pais) {
            const progresoDiv = document.getElementById('progreso');
            const lineastotal = document.getElementById('numlineas');
            
            // Filtrar instantáneo
            const datosPais = baseDatosIP.filter(d => d[3].trim().toLowerCase() === pais || d[2].trim().toLowerCase() === pais);
            
            if(datosPais.length === 0) {
                progresoDiv.innerHTML = "No se encontraron rangos para este país.";
                return;
            }

            const regiones = new Set();
            datosPais.forEach(d => regiones.add(d[4].trim()));

            const regionSelect = document.getElementById('region');
            regionSelect.innerHTML = '<option value="">Seleccione...</option>';
            Array.from(regiones).sort().forEach(region => {
                if(region) regionSelect.innerHTML += `<option value="${region}">${region}</option>`;
            });

            progresoDiv.innerHTML = `Regiones de ${datosPais[0][3]} cargadas con éxito.`;
            lineastotal.innerHTML = `${datosPais.length} rangos IPv4 encontrados.`;
        }

        function filtrarCiudades() {
            const regionSeleccionada = document.getElementById('region').value;
            if (!regionSeleccionada) { alert('Por favor, seleccione una región'); return; }

            const pais = document.getElementById('pais').value.trim().toLowerCase();
            const ciudadSelect = document.getElementById('ciudad');
            ciudadSelect.innerHTML = '<option value="">Seleccione...</option>';

            const rangosRegion = baseDatosIP.filter(d => (d[3].trim().toLowerCase() === pais || d[2].trim().toLowerCase() === pais) && d[4].trim() === regionSeleccionada);
            
            const ciudades = new Set();
            rangosRegion.forEach(d => ciudades.add(d[5].trim()));

            Array.from(ciudades).sort().forEach(ciudad => {
                if(ciudad) ciudadSelect.innerHTML += `<option value="${ciudad}">${ciudad}</option>`;
            });

            document.getElementById('progreso').innerHTML = `Ciudades listas para selección.`;
            document.getElementById('numlineas').innerHTML = `${rangosRegion.length} rangos en esta región.`;
        }

        function mostrarDatos() {
            const ciudadSeleccionada = document.getElementById('ciudad').value;
            if (!ciudadSeleccionada) { alert('Por favor, seleccione una ciudad'); return; }

            const pais = document.getElementById('pais').value.trim().toLowerCase();
            const region = document.getElementById('region').value.trim();

            const filtrados = baseDatosIP.filter(d => 
                (d[3].trim().toLowerCase() === pais || d[2].trim().toLowerCase() === pais) && 
                d[4].trim() === region && 
                d[5].trim() === ciudadSeleccionada
            );

            document.getElementById('campo1').value = filtrados.map(d => d[0].trim()).join('\n');
            document.getElementById('campo2').value = filtrados.map(d => d[1].trim()).join('\n');
            document.getElementById('progreso').innerHTML = `IPs de la ciudad cargadas.`;
            document.getElementById('numlineas').innerHTML = `${filtrados.length} rangos.`;
        }

        function mostrarDatos1() {
            const region = document.getElementById('region').value.trim();
            if (!region) { alert('Por favor, seleccione una región'); return; }
            const pais = document.getElementById('pais').value.trim().toLowerCase();

            const filtrados = baseDatosIP.filter(d => (d[3].trim().toLowerCase() === pais || d[2].trim().toLowerCase() === pais) && d[4].trim() === region);

            document.getElementById('campo1').value = filtrados.map(d => d[0].trim()).join('\n');
            document.getElementById('campo2').value = filtrados.map(d => d[1].trim()).join('\n');
            document.getElementById('progreso').innerHTML = `IPs de la región cargadas.`;
            document.getElementById('numlineas').innerHTML = `${filtrados.length} rangos.`;
        }

        // Descargas CSV optimizadas desde memoria
        function bajacsv0() {
            const pais = document.getElementById('pais').value.trim().toLowerCase();
            if (!pais) return;
            const filtrados = baseDatosIP.filter(d => d[3].trim().toLowerCase() === pais || d[2].trim().toLowerCase() === pais);
            generarCSV(filtrados, 'pais_' + pais);
        }

        function bajacsv1() {
            const region = document.getElementById('region').value.trim();
            if (!region) return;
            const pais = document.getElementById('pais').value.trim().toLowerCase();
            const filtrados = baseDatosIP.filter(d => (d[3].trim().toLowerCase() === pais || d[2].trim().toLowerCase() === pais) && d[4].trim() === region);
            generarCSV(filtrados, 'region_' + region);
        }

        function bajacsv2() {
            const ciudad = document.getElementById('ciudad').value;
            if (!ciudad) return;
            const pais = document.getElementById('pais').value.trim().toLowerCase();
            const region = document.getElementById('region').value.trim();
            const filtrados = baseDatosIP.filter(d => (d[3].trim().toLowerCase() === pais || d[2].trim().toLowerCase() === pais) && d[4].trim() === region && d[5].trim() === ciudad);
            generarCSV(filtrados, 'ciudad_' + ciudad);
        }

        function generarCSV(datos, nombre) {
            let csv = "IP Inicio,IP Fin,Codigo,Pais,Region,Ciudad\n" + datos.map(d => d.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${nombre}.csv`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        function cuentarangos1() {
            document.getElementById('ciudad').innerHTML = '<option value="">Seleccione...</option>';
            document.getElementById('campo1').value = "";
            document.getElementById('campo2').value = "";
        }

        function cuentarangos2() {
            document.getElementById('campo1').value = "";
            document.getElementById('campo2').value = "";
        }

        function copiarContenido(id) {
            const campo = document.getElementById(id);
            if(!campo.value) return;
            campo.select();
            navigator.clipboard.writeText(campo.value);
            alert('¡Copiado al portapapeles!');
        }

        function limpiarform() {
            document.getElementById('region').innerHTML = '<option value="">Seleccione...</option>';
            document.getElementById('ciudad').innerHTML = '<option value="">Seleccione...</option>';
            document.getElementById('campo1').value = "";
            document.getElementById('campo2').value = "";
            document.getElementById('progreso').innerHTML = "";
            document.getElementById('numlineas').innerHTML = "";
        }

        // Al iniciar, ordenamos el dropdown alfabéticamente automáticamente
        window.onload = function() {
            const select = document.getElementById('paises');
            const opciones = Array.from(select.options);
            const cabecera = opciones.shift(); // Quitar el "Seleccione..."
            opciones.sort((a, b) => a.text.localeCompare(b.text));
            select.innerHTML = "";
            select.appendChild(cabecera);
            opciones.forEach(op => select.appendChild(op));
        }
    </script>
