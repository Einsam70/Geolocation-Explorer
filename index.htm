    <script>
        // Función para limpiar las comillas de un valor CSV
        function limpiarComillas(valor) {
            return valor.replace(/^"(.*)"$/, '$1');
        }

        // Función para leer el archivo CSV y mostrar el progreso
        function leerCSV() {
            const archivo = 'csv/datos.csv'; // Ruta al archivo CSV
            const pais = document.getElementById('pais').value.trim().toLowerCase();
            let contador = 0;
            let totalFilas = 0;
            let lineasCoincidentes = 0;

            fetch(archivo)
                .then(response => response.text())
                .then(data => {
                    // Limpiar el CSV de comillas
                    data = data.replace(/"(.*?)"/g, limpiarComillas);

                    const filas = data.split('\n');
                    totalFilas = filas.length;
                    const regiones = new Set();

                    for (const fila of filas) {
                        const datos = fila.split(',');
                        if (datos.length >= 6 && datos[3].trim().toLowerCase() === pais) {
                            if (!esIPv6(datos[0].trim()) && !esIPv6(datos[1].trim())) {
                                regiones.add(datos[4].trim());
                                lineasCoincidentes++;
                            }
                        }
                    }

                    const regionSelect = document.getElementById('region');
                    regionSelect.innerHTML = '<option value="">Seleccione...</option>';
                    for (const region of Array.from(regiones).sort()) {
                        regionSelect.innerHTML += `<option value="${region}">${region}</option>`;
                    }
                })
                .catch(error => console.error('Error al leer el archivo CSV:', error))
                .finally(() => {
                    const progresoDiv = document.getElementById('progreso');
                    progresoDiv.innerHTML = `Listado de Regiones cargado`;
                    const lineastotal = document.getElementById('numlineas');
                    lineastotal.innerHTML = lineasCoincidentes + ' rangos encontrados';
                });
        }

        // Función para filtrar las ciudades basadas en la región seleccionada
        function filtrarCiudades() {
            const seleccionado = document.getElementById('region').value;

            // Verificar si no se ha seleccionado ningún valor
            if (!seleccionado) {
                // Si no se ha seleccionado ningún valor, mostrar un mensaje y detener la ejecución
                alert('Por favor, seleccione una región');
                return; // Detiene la ejecución de la función
            }

            const progresoDiv = document.getElementById('progreso');
            const lineastotal = document.getElementById('numlineas');
            progresoDiv.innerHTML = `Cargando...`;
            lineastotal.innerHTML = '';
            let lineasCoincidentes = 0;

            var limp1 = document.getElementById('campo1');
            var limp2 = document.getElementById('campo2');
            limp1.value = "";
            limp2.value = "";

            const regionSeleccionada = document.getElementById('region').value;
            const pais = document.getElementById('pais').value.trim().toLowerCase();
            const ciudadSelect = document.getElementById('ciudad');
            ciudadSelect.innerHTML = '<option value="">Seleccione...</option>';
            let contador = 0;
            let totalFilas = 0;
            let ciudades = [];

            fetch('csv/datos.csv')
                .then(response => response.text())
                .then(data => {
                    // Limpiar el CSV de comillas
                    data = data.replace(/"(.*?)"/g, limpiarComillas);

                    const filas = data.split('\n');
                    totalFilas = filas.length;

                    for (const fila of filas) {
                        const datos = fila.split(',');
                        if (datos.length >= 6 && datos[3].trim().toLowerCase() === pais && datos[4].trim() === regionSeleccionada) {
                            if (!esIPv6(datos[0].trim()) && !esIPv6(datos[1].trim())) {
                                ciudades.push(datos[5].trim());
                                lineasCoincidentes++;
                            }
                        }

                        contador += 1;
                        actualizarProgreso(contador, totalFilas);
                    }

                    // Ordenar las ciudades alfabéticamente
                    ciudades.sort();

                    // Eliminar duplicados
                    const ciudadesUnicas = Array.from(new Set(ciudades));

                    // Llenar el desplegable de ciudades
                    for (const ciudad of ciudadesUnicas) {
                        ciudadSelect.innerHTML += `<option value="${ciudad}">${ciudad}</option>`;
                    }
                })
                .catch(error => console.error('Error al leer el archivo CSV:', error))
                .finally(() => {
                    const progresoDiv = document.getElementById('progreso');
                    progresoDiv.innerHTML = `Listado de Ciudades cargado`;
                    const lineastotal = document.getElementById('numlineas');
                    lineastotal.innerHTML = lineasCoincidentes + ' rangos encontrados';
                });
        }

        // Función para actualizar el progreso
        function actualizarProgreso(completadas, total) {
            const porcentaje = Math.round((completadas / total) * 100);
            const progresoDiv = document.getElementById('progreso');
            progresoDiv.innerHTML = `Procesado: ${porcentaje}%`;
        }

        // Función para buscar datos al hacer clic en el botón "GO"
        function buscarDatos() {
            const paisInput = document.getElementById('pais').value;
            if (paisInput.trim() === '') {
                // Si está vacío, mostrar un mensaje y detener la ejecución
                alert('Por favor, ingrese un país');
                return; // Detiene la ejecución de la función
            }
            const progresoDiv = document.getElementById('progreso');
            const lineastotal = document.getElementById('numlineas');
            progresoDiv.innerHTML = `Cargando...`;
            lineastotal.innerHTML = '';

            leerCSV();
        }

        // Escuchar cambios en el textbox para cargar las regiones
        document.getElementById('pais').addEventListener('input', leerCSV);

            let campo1 = [];

                    // Limpiar el CSV de comillas
                    data = data.replace(/"(.*?)"/g, limpiarComillas);

                        const datos = fila.split(',');

                            // Filtrar solo los valores de IPv4

                                campo1.push(datos[0].trim());
                                campo2.push(datos[1].trim());
                                lineasCoincidentes++;
                            }
                        }
                    }

                    document.getElementById('campo1').value = campo1.join('\n');
                    document.getElementById('campo2').value = campo2.join('\n');
                })

                    progresoDiv.innerHTML = `Listado de IPs cargado`;

        // Función para verificar si una cadena es un valor de IPv6
        function esIPv6(cadena) {
            // Expresión regular para IPv6
            const ipv6Regex = /^(?=.*[a-fA-F0-9:]+)([a-fA-F0-9:]+)$/;

            return ipv6Regex.test(cadena);
        }

        function descargarArchivoCSV(csvContent,nombrecsv) {
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = nombrecsv + '.csv';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        }
